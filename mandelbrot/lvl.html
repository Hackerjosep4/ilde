<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Level Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00ffcc; --accent2: #ff3366; --text: #c8c8d8; --dim: #444466;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  header h1 { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; }
  .controls { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .controls label { color: var(--dim); font-size: 0.72rem; letter-spacing: 2px; }
  .controls input[type=number] {
    background: var(--bg); border: 1px solid var(--accent); color: var(--accent);
    font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
    padding: 6px 10px; width: 70px; text-align: center;
  }
  .controls input[type=number]:focus { outline: none; border-color: var(--accent); }
  button {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
    padding: 8px 16px; cursor: pointer; letter-spacing: 2px;
    transition: background 0.2s, color 0.2s; text-transform: uppercase;
  }
  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; }
  button:disabled:hover { background: transparent; color: var(--dim); }
  #status { font-size: 0.7rem; color: var(--dim); margin-left: auto; }
  #status span { color: var(--accent2); }
  .canvas-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  canvas { image-rendering: pixelated; display: block; border: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <h1>Level Viewer</h1>
</header>
<div class="controls">
  <label>LEVEL N</label>
  <input type="number" id="lvl-input" value="1" min="1" max="20">
  <button id="load-btn" onclick="loadLevel()">▶ Load</button>
  <div id="status">—</div>
</div>
<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<script>
  const API      = 'https://hackerblock.sytes.net/mbapi';
  const MAX_CONC = 16;

  let currentN = null;
  let abortFlag = false;

  function getCanvasSize() {
    const wrap = document.querySelector('.canvas-wrap');
    return Math.min(wrap.clientWidth, wrap.clientHeight);
  }

  async function loadLevel() {
    const n = parseInt(document.getElementById('lvl-input').value);
    if (isNaN(n) || n < 1) return;

    abortFlag = true;
    await new Promise(r => setTimeout(r, 50));
    abortFlag = false;

    currentN = n;

    const btn = document.getElementById('load-btn');
    btn.disabled = true;

    const total  = Math.pow(2, n);
    const sizePx = getCanvasSize();
    const tilePx = sizePx / total;  // cada tile s'escala per encaixar

    const canvas = document.getElementById('canvas');
    canvas.width  = sizePx;
    canvas.height = sizePx;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, sizePx, sizePx);

    // Generar llista de tots els tiles
    const tiles = [];
    for (let y = 0; y < total; y++)
      for (let x = 0; x < total; x++)
        tiles.push({ x, y });

    let done = 0, found = 0;
    const com = tiles.length;

    function setStatus(extra) {
      document.getElementById('status').innerHTML =
        `checked: <span>${done}/${com}</span> &nbsp; rendered: <span>${found}</span>${extra ? ' &nbsp; ' + extra : ''}`;
    }
    setStatus('');

    // Processar en grups de MAX_CONC
    for (let i = 0; i < tiles.length; i += MAX_CONC) {
      if (abortFlag || currentN !== n) break;

      const chunk = tiles.slice(i, i + MAX_CONC);
      await Promise.all(chunk.map(({ x, y }) => processTile(n, x, y, ctx, total, tilePx)));
      done += chunk.length;
      found = countFound(ctx, n, total); // actualitzar comptador
      setStatus('');
    }

    setStatus(abortFlag ? '<span style="color:var(--dim)">cancelled</span>' : '✓');
    btn.disabled = false;
  }

  // Comptador de tiles carregats (mantenim un set apart)
  const loadedSet = new Set();

  async function processTile(n, x, y, ctx, total, tilePx) {
    const key = `${n}_${x}_${y}`;
    try {
      const r = await fetch(`${API}/check/${n}/${x}/${y}`);
      if (!r.ok) return;
      const data = await r.json();
      if (!data.exists) return;

      // Existeix → carregar imatge
      await new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          // y=0 és la fila inferior en coordenades matemàtiques → fila superior al canvas és y_max-1
          const canvasY = (total - 1 - y) * tilePx;
          const canvasX = x * tilePx;
          ctx.drawImage(img, canvasX, canvasY, tilePx, tilePx);
          loadedSet.add(key);
          resolve();
        };
        img.onerror = resolve;
        img.src = `./img/mbz_${n}_${x}_${y}.png`;
      });
    } catch { /* ignora errors de xarxa */ }
  }

  function countFound(ctx, n, total) {
    return loadedSet.size;
  }
</script>
</body>
</html>
